name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: skill
    attributes:
      label: Scope
      options:
        - claude-supervision
        - codex-supervision
        - kimi-supervision
        - cross-skill
        - repository docs or packaging
    validations:
      required: true
  - type: textarea
    id: need
    attributes:
      label: Need
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Keep it narrow and explain the trade-offs.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
